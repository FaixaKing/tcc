<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Status da Lavagem</title>

<link rel="stylesheet" href="./css/status.css">

</head>

<body>

<div class="container">

<h1 id="maquina">Lavadora</h1>

<div class="card">

<h2>Status</h2>

<p class="ativo">Lavagem em andamento 🫧</p>

</div>


<div class="card tempo">

<h2>Tempo restante</h2>

<p id="tempo">35 min</p>

</div>


<button onclick="voltar()">Voltar</button>

</div>


<script>

const parametros = new URLSearchParams(window.location.search);

const maq = parametros.get("maq");

const titulo = document.getElementById("maquina");


if(maq == 1){

titulo.innerHTML = "Lavadora 1";

}

else if(maq == 2){

titulo.innerHTML = "Lavadora 2";

}

else if(maq == 3){

titulo.innerHTML = "Secadora";

}


function voltar(){

window.location.href="index.html";

}

</script>

</body>
</html>
