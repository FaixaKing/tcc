<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Status da Lavagem</title>

<link rel="stylesheet" href="status.css">

</head>

<body>

<div class="container">

<h1 id="titulo">Carregando máquina...</h1>

<div class="tempo" id="tempo">
00:00
</div>

<p id="status">Preparando...</p>

</div>


<script>

/* detectar qual máquina veio do cartão */

const params = new URLSearchParams(window.location.search)

const maquina = params.get("maq")


/* definir tempo de cada máquina */

let tempo

if(maquina == "1"){

tempo = 45 * 60
document.getElementById("titulo").innerHTML = "Lavadora 01"

}

else if(maquina == "2"){

tempo = 40 * 60
document.getElementById("titulo").innerHTML = "Lavadora 02"

}

else if(maquina == "secadora"){

tempo = 30 * 60
document.getElementById("titulo").innerHTML = "Secadora"

}

else{

tempo = 50 * 60
document.getElementById("titulo").innerHTML = "Lavadora Pet"

}


/* contador regressivo */

function atualizarTempo(){

let minutos = Math.floor(tempo / 60)

let segundos = tempo % 60

if(segundos < 10){

segundos = "0" + segundos

}

document.getElementById("tempo").innerHTML =
minutos + ":" + segundos

tempo--

if(tempo < 0){

document.getElementById("status").innerHTML =
"Lavagem finalizada ✅"

}

}

setInterval(atualizarTempo, 1000)

</script>

</body>

</html>
