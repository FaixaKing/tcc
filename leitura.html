<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leitura NFC</title>

<link rel="stylesheet" href="./css/leitura.css">

</head>

<body>

<div class="container">

<div class="icone">📶</div>

<h1>Aproxime seu cartão NFC</h1>

<p id="status">Aguardando leitura do cartão...</p>

</div>


<script>

const statusTexto = document.getElementById("status");

async function lerNFC(){

try{

const ndef = new NDEFReader();

await ndef.scan();

statusTexto.innerHTML = "Aguardando leitura do cartão...";

ndef.onreading = event => {

statusTexto.innerHTML = "Cartão detectado ✅";

setTimeout(()=>{

window.location.href="status.html";

},2000);

};

}catch(error){

statusTexto.innerHTML =
"NFC não suportado neste dispositivo";

}

}

lerNFC();

</script>

</body>

</html>
